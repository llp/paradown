# paradown example configuration
#
# Load with:
#   cargo run --all-features -- --config ./examples/config.toml --urls https://example.com/file.iso
#
# Paths are resolved relative to the current working directory.

schema_version = 1
download_dir = "./downloads"
shuffle_tasks = false
concurrent_tasks = 4
segments_per_task = 4
rate_limit_kib_per_sec = 512
connect_timeout_secs = 30
storage_backend = { Sqlite = "./downloads.db" }
# Alternative lightweight state file:
# storage_backend = { JsonFile = "./downloads.json" }
file_conflict_strategy = "Resume"
log_level = "info"
completion_hook = "echo paradown finished: completed=$PARADOWN_COMPLETED failed=$PARADOWN_FAILED"

[retry]
max_retries = 3
initial_delay = 1
max_delay = 30
backoff_factor = 2.0

[progress_throttle]
interval_ms = 200
threshold_bytes = 1048576

[http.client]
cookie_store = false
# cookie_jar_path = "./cookies/session.json"

[http.client.tls]
insecure_skip_verify = false
# ca_certificate_pem = "./certs/internal-root.pem"
# client_identity_pem = "./certs/client-identity.pem"

[http.client.proxy]
use_env_proxy = true

[http.request]
user_agent = "paradown/0.1.1"

[[http.request.headers]]
name = "Accept"
value = "*/*"
