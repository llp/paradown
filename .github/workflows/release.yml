name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: "${{ matrix.os }} / build release bundle"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate tag version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"

          if [[ -z "$MANIFEST_VERSION" ]]; then
            echo "Failed to read package version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$MANIFEST_VERSION" ]]; then
            echo "Tag version '$TAG_VERSION' does not match Cargo.toml version '$MANIFEST_VERSION'" >&2
            exit 1
          fi

      - name: Build release artifacts
        run: ./scripts/build-release.sh --out-dir dist

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.sbom.json
            dist/*.sig
            dist/*.asc
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release bundles
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Extract release notes from changelog
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="release-notes.md"

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1; print; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > "$NOTES_FILE"

          if [[ ! -s "$NOTES_FILE" ]]; then
            {
              echo "## $VERSION"
              echo
              echo "See CHANGELOG.md for release details."
            } > "$NOTES_FILE"
          fi

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.sha256
            release-artifacts/**/*.sbom.json
            release-artifacts/**/*.sig
            release-artifacts/**/*.asc
